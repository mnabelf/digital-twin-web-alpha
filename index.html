<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Twin - Full System + Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: { colors: { darkbg: '#111827', panelbg: '#1f2937', emerald: '#10b981' } }
            }
        }
    </script>
</head>
<body class="bg-darkbg text-gray-200 font-sans h-screen w-screen overflow-hidden flex">

    <div class="w-1/3 min-w-[350px] bg-panelbg border-r border-gray-700 overflow-y-auto flex flex-col shadow-xl z-10">
        
        <div class="bg-gray-800 p-6 border-b border-gray-700 shrink-0">
            <h1 class="text-2xl font-bold text-center text-emerald">Smart Room Twin</h1>
            <p class="text-sm text-center text-gray-400 mt-1">Status: <span class="text-emerald font-medium">Sistem Aktif</span></p>
        </div>

        <div class="p-6 flex-1">
            
            <h2 class="text-sm font-semibold text-emerald mb-4 uppercase tracking-wider border-b border-gray-700 pb-2">1. Simulator Sensor</h2>
            <div class="mb-6">
                <div class="flex justify-between text-sm mb-2">
                    <span class="text-gray-400">Suhu Ruangan</span>
                    <span id="label-suhu" class="font-bold text-white text-lg">20°C</span>
                </div>
                <input type="range" id="slider-suhu" min="15" max="40" value="20" class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-emerald-500">
            </div>

            <div class="mb-8">
                <div class="flex justify-between text-sm mb-2">
                    <span class="text-gray-400">Intensitas Cahaya Luar</span>
                    <span id="label-cahaya" class="font-bold text-white text-lg">80%</span>
                </div>
                <input type="range" id="slider-cahaya" min="0" max="100" value="80" class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-emerald-500">
            </div>

            <h2 class="text-sm font-semibold text-emerald mb-4 uppercase tracking-wider border-b border-gray-700 pb-2">2. Panel Kontrol</h2>
            <div class="flex items-center justify-between bg-gray-800 p-4 rounded-lg border border-gray-700 mb-6">
                <div>
                    <span class="text-sm font-medium block text-white">Mode Manual Override</span>
                    <span class="text-xs text-gray-400 mt-1 block" id="status-otomatis">Sistem Otomatis: AKTIF</span>
                </div>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="toggle-manual" class="sr-only peer">
                    <div class="w-11 h-6 bg-gray-600 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-emerald"></div>
                </label>
            </div>

            <div class="flex flex-col gap-4 mb-8">
                <button id="btn-lampu" class="py-4 px-4 rounded-lg font-medium text-sm transition-all duration-300 bg-gray-700 text-gray-500 w-full" disabled>
                    Lampu Utama
                </button>
                <button id="btn-ac" class="py-4 px-4 rounded-lg font-medium text-sm transition-all duration-300 bg-gray-700 text-gray-500 w-full" disabled>
                    AC Pendingin
                </button>
            </div>

            <h2 class="text-sm font-semibold text-emerald mb-4 uppercase tracking-wider border-b border-gray-700 pb-2">3. Riwayat Suhu (Live)</h2>
            <div class="bg-gray-800 p-4 rounded-lg border border-gray-700 w-full">
                <canvas id="grafikSuhu" height="150"></canvas>
            </div>
            
        </div>
    </div>

    <div class="flex-1 bg-black relative">
        <iframe 
            src="unity/index.html" 
            class="w-full h-full border-none absolute top-0 left-0"
            title="Unity WebGL View">
        </iframe>
        <div class="absolute inset-0 pointer-events-none shadow-[inset_0_0_100px_rgba(0,0,0,0.8)] z-0"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, set } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAiBWY4MHU7p4GzNAzwt94L0aP1oeOVFZs",
            authDomain: "digital-twin-fb5b1.firebaseapp.com",
            databaseURL: "https://digital-twin-fb5b1-default-rtdb.firebaseio.com", 
            projectId: "digital-twin-fb5b1",
            storageBucket: "digital-twin-fb5b1.firebasestorage.app",
            messagingSenderId: "734441249544",
            appId: "1:734441249544:web:45de917768e35b221c6abd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const sliderSuhu = document.getElementById('slider-suhu');
        const sliderCahaya = document.getElementById('slider-cahaya');
        const labelSuhu = document.getElementById('label-suhu');
        const labelCahaya = document.getElementById('label-cahaya');
        
        const toggleManual = document.getElementById('toggle-manual');
        const btnLampu = document.getElementById('btn-lampu');
        const btnAC = document.getElementById('btn-ac');
        const statusOtomatis = document.getElementById('status-otomatis');

        const sensorRef = ref(db, 'smart_room/sensor');
        const kontrolRef = ref(db, 'smart_room/kontrol');

        let isManualMode = false;

        sliderSuhu.addEventListener('input', (e) => {
            const nilai = parseInt(e.target.value);
            labelSuhu.innerText = nilai + "°C";
            set(ref(db, 'smart_room/sensor/suhu'), nilai);
            cekLogikaOtomatis(nilai, parseInt(sliderCahaya.value));
        });

        sliderCahaya.addEventListener('input', (e) => {
            const nilai = parseInt(e.target.value);
            labelCahaya.innerText = nilai + "%";
            set(ref(db, 'smart_room/sensor/cahaya'), nilai);
            cekLogikaOtomatis(parseInt(sliderSuhu.value), nilai);
        });

        function cekLogikaOtomatis(suhuSekarang, cahayaSekarang) {
            if (isManualMode) return; 
            update(kontrolRef, {
                ac_pendingin: (suhuSekarang > 25),
                lampu_utama: (cahayaSekarang < 40)
            });
        }

        onValue(kontrolRef, (snapshot) => {
            const data = snapshot.val();
            if(data) {
                isManualMode = data.mode_manual || false;
                toggleManual.checked = isManualMode;
                perbaruiTampilanTombol(isManualMode, data.lampu_utama, data.ac_pendingin);
            }
        });

        toggleManual.addEventListener('change', () => {
            update(kontrolRef, { mode_manual: toggleManual.checked });
            if(!toggleManual.checked) {
                cekLogikaOtomatis(parseInt(sliderSuhu.value), parseInt(sliderCahaya.value));
            }
        });

        btnLampu.addEventListener('click', () => {
            update(kontrolRef, { lampu_utama: !btnLampu.classList.contains('bg-yellow-500') });
        });

        btnAC.addEventListener('click', () => {
            update(kontrolRef, { ac_pendingin: !btnAC.classList.contains('bg-emerald-500') });
        });

        function perbaruiTampilanTombol(manual, lampuOn, acOn) {
            statusOtomatis.innerText = manual ? "Sistem Otomatis: MATI" : "Sistem Otomatis: AKTIF";
            statusOtomatis.className = manual ? "text-xs mt-1 block text-red-400" : "text-xs mt-1 block text-emerald-400";

            if (manual) {
                btnLampu.disabled = false; btnAC.disabled = false;
                btnLampu.className = lampuOn ? "py-4 px-4 rounded-lg font-medium text-sm transition-all bg-yellow-500 text-black shadow-[0_0_15px_rgba(234,179,8,0.5)] w-full" : "py-4 px-4 rounded-lg font-medium text-sm transition-all bg-gray-800 text-white border border-gray-600 hover:bg-gray-700 w-full";
                btnAC.className = acOn ? "py-4 px-4 rounded-lg font-medium text-sm transition-all bg-emerald-500 text-white shadow-[0_0_15px_rgba(16,185,129,0.5)] w-full" : "py-4 px-4 rounded-lg font-medium text-sm transition-all bg-gray-800 text-white border border-gray-600 hover:bg-gray-700 w-full";
            } else {
                btnLampu.disabled = true; btnAC.disabled = true;
                btnLampu.className = lampuOn ? "py-4 px-4 rounded-lg font-medium text-sm transition-all bg-yellow-500/50 text-black border-2 border-yellow-500 opacity-80 w-full" : "py-4 px-4 rounded-lg font-medium text-sm transition-all bg-gray-700 text-gray-500 opacity-50 w-full";
                btnAC.className = acOn ? "py-4 px-4 rounded-lg font-medium text-sm transition-all bg-emerald-500/50 text-white border-2 border-emerald-500 opacity-80 w-full" : "py-4 px-4 rounded-lg font-medium text-sm transition-all bg-gray-700 text-gray-500 opacity-50 w-full";
            }
        }

        // ==========================================
        // LOGIKA GRAFIK CHART.JS (BARU)
        // ==========================================
        const ctx = document.getElementById('grafikSuhu').getContext('2d');
        const grafikSuhu = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [], // Sumbu X (Waktu)
                datasets: [{
                    label: 'Suhu (°C)',
                    data: [], // Sumbu Y (Nilai Suhu)
                    borderColor: '#10b981', // Emerald green
                    backgroundColor: 'rgba(16, 185, 129, 0.2)', // Efek gradient di bawah garis
                    borderWidth: 2,
                    tension: 0.4, // Membuat garis melengkung halus (spline)
                    fill: true,
                    pointRadius: 0 // Menyembunyikan titik agar bersih
                }]
            },
            options: {
                responsive: true,
                animation: false, // Dimatikan agar tidak patah-patah saat update tiap detik
                plugins: {
                    legend: { display: false } // Sembunyikan legenda
                },
                scales: {
                    y: { 
                        min: 15, max: 45, // Batas suhu
                        grid: { color: '#374151' }, // Warna garis latar
                        ticks: { color: '#9ca3af' }
                    },
                    x: { 
                        grid: { display: false },
                        ticks: { display: false } // Sembunyikan label waktu agar rapi
                    }
                }
            }
        });

        // Loop Real-time: Ambil data suhu dari slider setiap 1 detik
        setInterval(() => {
            const suhuSekarang = parseInt(sliderSuhu.value);
            
            // Tambahkan data baru
            grafikSuhu.data.labels.push(''); 
            grafikSuhu.data.datasets[0].data.push(suhuSekarang);

            // Jika titik data lebih dari 20, hapus yang paling kiri (efek scrolling)
            if (grafikSuhu.data.labels.length > 20) {
                grafikSuhu.data.labels.shift();
                grafikSuhu.data.datasets[0].data.shift();
            }

            // Perbarui tampilan grafik
            grafikSuhu.update();
        }, 1000); // 1000 ms = 1 detik

    </script>
</body>
</html>
